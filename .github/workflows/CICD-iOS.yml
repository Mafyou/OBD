name: 🍎 OBD iOS CI/CD

run-name: >-
  ${{
    github.event_name == 'pull_request'
    && format('PR #{0} · iOS checks', github.event.pull_request.number)
    || format('{0} · iOS pipeline', github.ref_name)
  }}

on:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'src/Fronts/OBD.Mobile/**'
  #     - 'src/Fronts/OBD.Mobile.Lib/**'
  #     - 'src/Shared/**'
  #     - '.github/workflows/CICD-iOS.yml'
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - 'src/Fronts/OBD.Mobile/**'
  #     - 'src/Fronts/OBD.Mobile.Lib/**'
  #     - 'src/Shared/**'
  #     - '.github/workflows/CICD-iOS.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.100'
  IOS_PROJECT: 'src/Fronts/OBD.Mobile/OBD.Mobile.csproj'
  IOS_FRAMEWORK: 'net10.0-ios'

concurrency:
  group: obd-ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios:
    name: 🍎 Build iOS + TestFlight
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: Use Xcode 26.5
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.5'   # version exacte, entre guillemets

      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj
            **/global.json

      - name: 🔍 Xcode diagnostics
        run: |
          xcode-select -p
          xcodebuild -version
          dotnet --info
          dotnet workload list

      - name: 🧭 Configure Apple SDK environment
        shell: bash
        run: |
          DEVELOPER_PATH="$(xcode-select -p)"
          echo "DEVELOPER_DIR=$DEVELOPER_PATH" >> "$GITHUB_ENV"
          echo "DOTNET_CLI_HOME=$HOME" >> "$GITHUB_ENV"
          echo "Using DEVELOPER_DIR=$DEVELOPER_PATH"

      - name: 🧰 Restore MAUI workloads
        run: dotnet workload restore "${{ env.IOS_PROJECT }}"

      - name: 🔄 Restore iOS project
        run: dotnet restore "${{ env.IOS_PROJECT }}" -p:RuntimeIdentifier=ios-arm64

      - name: 🔨 Build iOS project (PR, no signing)
        if: github.event_name == 'pull_request'
        run: >
          env -u MD_APPLE_SDK_ROOT dotnet build "${{ env.IOS_PROJECT }}"
          -f ${{ env.IOS_FRAMEWORK }}
          -c Release
          --no-restore
          -p:RuntimeIdentifier=ios-arm64
          -p:EnableCodeSigning=false

      - name: 🔐 Configure signing assets
        if: github.event_name != 'pull_request'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          printf '%s' "$BUILD_CERTIFICATE_BASE64" | tr -d '\r\n' | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '\r\n' | base64 --decode > "$PP_PATH"

          P12_PASSWORD_CLEAN="$(printf '%s' "$P12_PASSWORD" | tr -d '\r\n')"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD_CLEAN" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles"

      - name: 📦 Publish signed IPA
        if: github.event_name != 'pull_request'
        env:
          IOS_SIGNING_IDENTITY: ${{ secrets.IOS_SIGNING_IDENTITY }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: >
          env -u MD_APPLE_SDK_ROOT dotnet publish "${{ env.IOS_PROJECT }}"
          -f ${{ env.IOS_FRAMEWORK }}
          -c Release
          --no-restore
          -p:ArchiveOnBuild=true
          -p:RuntimeIdentifier=ios-arm64
          -p:EnableCodeSigning=true
          -p:CodesignKey="${{ env.IOS_SIGNING_IDENTITY }}"
          -p:CodesignProvision="${{ env.IOS_PROVISIONING_PROFILE_NAME }}"

      - name: 🔎 Locate IPA
        if: github.event_name != 'pull_request'
        id: ipa
        shell: bash
        run: |
          IPA_PATH=$(find src/Fronts/OBD.Mobile/bin/Release/${{ env.IOS_FRAMEWORK }}/ios-arm64/publish -name '*.ipa' | head -n 1)

          if [ -z "$IPA_PATH" ]; then
            IPA_PATH=$(find src/Fronts/OBD.Mobile/bin/Release/${{ env.IOS_FRAMEWORK }} -name '*.ipa' | head -n 1)
          fi

          if [ -z "$IPA_PATH" ]; then
            echo "No IPA generated"
            exit 1
          fi

          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "Found IPA at: $IPA_PATH"

      - name: ✅ Validate IPA before upload
        if: github.event_name != 'pull_request'
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_API_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -z "$APPSTORE_KEY_ID" ] || [ -z "$APPSTORE_ISSUER_ID" ] || [ -z "$APPSTORE_API_PRIVATE_KEY_BASE64" ]; then
            echo "Missing App Store Connect secrets: APPSTORE_KEY_ID, APPSTORE_ISSUER_ID, APPSTORE_API_PRIVATE_KEY_BASE64"
            exit 1
          fi

          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPSTORE_KEY_ID}.p8"
          printf '%s' "$APPSTORE_API_PRIVATE_KEY_BASE64" | tr -d '\r\n' | base64 --decode > "$API_KEY_PATH"

          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$API_KEY_PATH" "$HOME/.appstoreconnect/private_keys/"

          xcrun altool --validate-app \
            --type ios \
            --file "${{ steps.ipa.outputs.ipa_path }}" \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"

      - name: 📤 Upload signed IPA artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: obd-ios-ipa
          path: ${{ steps.ipa.outputs.ipa_path }}
          retention-days: 7
          if-no-files-found: error

      - name: 🚀 Upload to TestFlight
        if: github.event_name != 'pull_request'
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPSTORE_API_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -z "$APPSTORE_KEY_ID" ] || [ -z "$APPSTORE_ISSUER_ID" ] || [ -z "$APPSTORE_API_PRIVATE_KEY_BASE64" ]; then
            echo "Missing App Store Connect secrets: APPSTORE_KEY_ID, APPSTORE_ISSUER_ID, APPSTORE_API_PRIVATE_KEY_BASE64"
            exit 1
          fi

          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPSTORE_KEY_ID}.p8"

          printf '%s' "$APPSTORE_API_PRIVATE_KEY_BASE64" | tr -d '\r\n' | base64 --decode > "$API_KEY_PATH"

          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$API_KEY_PATH" "$HOME/.appstoreconnect/private_keys/"

          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.ipa.outputs.ipa_path }}" \
            --apiKey "$APPSTORE_KEY_ID" \
            --apiIssuer "$APPSTORE_ISSUER_ID"
